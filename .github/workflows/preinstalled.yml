name: Pre-installed Tools Check
on: push
jobs:
  check-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Version
        run: docker --version 
      - name: Check Python Version  
        run: python3 --version
      - name: Check Node Version 
        run: node --version
      - name: Check Git Version
        run: git --version
      - name: Check Java Version
        run: java --version

